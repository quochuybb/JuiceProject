services:
  postgres:
    image: postgres:15
    container_name: juice_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword123
      POSTGRES_DB: juicematch_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: juice_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@juice.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
